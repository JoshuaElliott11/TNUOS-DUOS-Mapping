<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUoS + TNUoS Coordinate Lookup</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --charcoal: #1f1f23;
      --purple: #8d2eff;
      --pink: #ff00a8;
      --green: #76f5d8;
      --blue: #0c1c73;
      --bg: var(--charcoal);
      --panel: rgba(12, 28, 115, 0.86);
      --ink: #ffffff;
      --line: rgba(118, 245, 216, 0.34);
      --input-bg: rgba(31, 31, 35, 0.9);
      --input-line: rgba(118, 245, 216, 0.55);
      --status: #d8d8e6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Sharp Sans Semibold", "Sharp Sans", "Segoe UI Semibold", "Segoe UI", Tahoma, sans-serif;
      font-weight: 600;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 8%, rgba(141, 46, 255, 0.4) 0, transparent 34%),
        radial-gradient(circle at 92% 10%, rgba(255, 0, 168, 0.32) 0, transparent 36%),
        radial-gradient(circle at 15% 92%, rgba(118, 245, 216, 0.24) 0, transparent 35%),
        radial-gradient(circle at 85% 88%, rgba(12, 28, 115, 0.55) 0, transparent 42%),
        var(--bg);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(900px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 16px 42px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(4px);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.4rem, 2.5vw, 2rem);
      color: var(--green);
    }

    p {
      margin: 0 0 18px;
      line-height: 1.45;
    }

    .section-title {
      margin: 18px 0 10px;
      color: var(--green);
      letter-spacing: 0.02em;
      font-size: 0.95rem;
      text-transform: uppercase;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    label {
      font-size: 0.9rem;
      display: block;
      margin-bottom: 6px;
    }

    input,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--input-line);
      border-radius: 10px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      color: var(--ink);
      background: var(--input-bg);
    }

    input::placeholder {
      color: rgba(255, 255, 255, 0.65);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255, 0, 168, 0.25);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(120deg, var(--purple), var(--pink));
      color: white;
    }

    button.secondary {
      background: linear-gradient(120deg, #2f377a, #1d2452);
      border: 1px solid rgba(118, 245, 216, 0.25);
    }

    button:hover { filter: brightness(1.05); }

    .status {
      margin-top: 12px;
      color: var(--status);
      font-size: 0.9rem;
    }

    .result {
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(31, 31, 35, 0.84);
      border: 1px solid var(--line);
      display: none;
    }

    .result-row {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 10px;
      padding: 6px 0;
      border-bottom: 1px dashed rgba(118, 245, 216, 0.26);
    }

    .result-row:last-child { border-bottom: none; }
    .k { font-weight: 600; }
    .v { color: #ffffff; }

    .warn {
      margin-top: 10px;
      color: var(--green);
      font-weight: 600;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
      .result-row { grid-template-columns: 1fr; }
      .button-row button { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>DUoS + TNUoS Lookup + Tariff Recommender</h1>
    <p>Select a site archetype, add location and capacity, and the tool will tell you which DUoS/TNUoS tariff presets and residual band inputs to include.</p>

    <div class="section-title">Location</div>
    <div class="row">
      <div>
        <label for="lat">Latitude</label>
        <input id="lat" type="number" step="any" placeholder="e.g. 52.2053">
      </div>
      <div>
        <label for="lon">Longitude</label>
        <input id="lon" type="number" step="any" placeholder="e.g. 0.1218">
      </div>
    </div>

    <div class="section-title">Site Setup</div>
    <div class="row">
      <div>
        <label for="siteType">Site archetype</label>
        <select id="siteType">
          <option value="dist_import_final">1. Pure final-demand import site distribution-connected (no export)</option>
          <option value="trans_import_final">2. Pure final-demand import site transmission-connected (no export)</option>
          <option value="dist_import_export">3. Distribution-connected import + export site (final-demand plus embedded export)</option>
          <option value="dist_export_only">4. Distribution-connected export-led site (embedded export only)</option>
          <option value="trans_generation_export">5. Pure transmission-connected generation/export site</option>
          <option value="dist_storage_bidirectional">6. Distribution-connected bidirectional storage/energy site (import and export)</option>
          <option value="trans_storage_bidirectional">7. Transmission-connected bidirectional storage/energy site (import and export)</option>
        </select>
      </div>
      <div id="demandBasisWrap">
        <label for="demandBasis">Band basis</label>
        <select id="demandBasis"></select>
      </div>
    </div>

    <div class="section-title">Connection / Usage Input</div>
    <div class="row">
      <div>
        <label for="capacity">Capacity / annual quantity</label>
        <input id="capacity" type="number" step="any" placeholder="e.g. 120">
      </div>
      <div>
        <label for="capacityUnit">Input unit</label>
        <select id="capacityUnit">
          <option value="kVA">kVA</option>
          <option value="kW">kW</option>
          <option value="kWh">kWh/year</option>
          <option value="MWh">MWh/year</option>
        </select>
      </div>
    </div>

    <div class="button-row">
      <button id="lookupBtn" class="secondary">Lookup Regions</button>
      <button id="recommendBtn">Recommend Tariffs</button>
    </div>

    <div class="status" id="status">Loading datasets...</div>
    <section class="result" id="result"></section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
  <script>
    const SITE_ARCHETYPES = {
      pure_final_dist: {
        label: "1. Pure final-demand import site distribution-connected (no export)",
        needsLvHvBand: true,
        needsResidualBand: true,
        residualType: "distribution",
        tariffs: ["duos_site_specific_import", "tnuos_residual", "tnuos_import_triads"],
      },
      pure_final_trans: {
        label: "2. Pure final-demand import site transmission-connected (no export)",
        needsLvHvBand: false,
        needsResidualBand: true,
        residualType: "t_demand",
        tariffs: ["tnuos_residual", "tnuos_import_triads"],
      },
      standalone_storage_dist: {
        label: "3. Stand-alone storage / non-final demand site distribution-connected",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["duos_no_residual_import", "duos_generation_site_specific_export", "tnuos_import_triads", "tnuos_embedded_export"],
      },
      standalone_storage_trans: {
        label: "4. Stand-alone storage / non-final demand site transmission-connected",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["tnuos_import_triads", "tnuos_wider_generation"],
      },
      dist_generator_only: {
        label: "5. Distribution-connected generator only (<100 MW, no demand)",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["duos_generation_site_specific_export", "tnuos_embedded_export"],
      },
      trans_generator_only: {
        label: "6. Transmission-connected generator / Distribution-Connected TEC >100 MW",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["tnuos_wider_generation"],
      },
      mixed_dist: {
        label: "7. Mixed final-demand + generation site Distribution Connected (BtM co-loc + generation) <100MW TEC",
        needsLvHvBand: true,
        needsResidualBand: true,
        residualType: "distribution",
        tariffs: ["duos_site_specific_import", "duos_generation_site_specific_export", "tnuos_residual", "tnuos_import_triads", "tnuos_embedded_export"],
      },
      mixed_trans: {
        label: "8. Mixed final-demand + generation site Transmission Connected (BtM co-location)",
        needsLvHvBand: false,
        needsResidualBand: true,
        residualType: "t_demand",
        tariffs: ["tnuos_residual", "tnuos_import_triads", "tnuos_wider_generation"],
      },
      colocated_dist: {
        label: "9. Co-located Renewables + BESS Import - Distribution",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["duos_no_residual_import", "duos_generation_site_specific_export", "tnuos_import_triads", "tnuos_embedded_export"],
      },
      colocated_trans: {
        label: "10. Co-located Renewables + BESS Import - Transmission",
        needsLvHvBand: false,
        needsResidualBand: false,
        residualType: "none",
        tariffs: ["tnuos_import_triads", "tnuos_wider_generation"],
      },
    };

    const DEMAND_ZONE_FROM_GSP_GROUP = {
      _A: { zone: 9, name: "Eastern" },
      _B: { zone: 7, name: "East Midlands" },
      _C: { zone: 12, name: "London" },
      _D: { zone: 6, name: "N Wales & Mersey" },
      _E: { zone: 8, name: "Midlands" },
      _F: { zone: 3, name: "Northern" },
      _G: { zone: 4, name: "North West" },
      _H: { zone: 13, name: "Southern" },
      _J: { zone: 11, name: "South East" },
      _K: { zone: 10, name: "South Wales" },
      _L: { zone: 14, name: "South Western" },
      _M: { zone: 5, name: "Yorkshire" },
      _N: { zone: 2, name: "Southern Scotland" },
      _P: { zone: 1, name: "Northern Scotland" },
    };

    const GRANULAR_DUOS_OPERATOR_BY_REGION = {
      "East England": "UKPN (EPN)",
      "London": "UKPN (LPN)",
      "South East England": "UKPN (SPN)",
      "North Scotland": "SSEN (SHEPD)",
      "Southern England": "SSEN (SEPD)",
      "North Wales, Merseyside and Cheshire": "SPEN (SPM / SP Manweb)",
      "South and Central Scotland": "SPEN (SPD / SP Distribution)",
      "North East England": "Northern Powergrid (NPgN)",
      "Yorkshire": "Northern Powergrid (NPgY)",
      "North West England": "ENWL",
      "East Midlands": "NGED (EMEB)",
      "West Midlands": "NGED (WEBM)",
      "South Wales": "NGED (SWALES)",
      "South West England": "NGED (SWEST)",
    };

    const DEMAND_ZONE_FROM_GRANULAR_DUOS = {
      "UKPN (EPN)": 9,
      "UKPN (LPN)": 12,
      "UKPN (SPN)": 11,
      "SSEN (SHEPD)": 1,
      "SSEN (SEPD)": 13,
      "SPEN (SPM / SP Manweb)": 6,
      "SPEN (SPD / SP Distribution)": 2,
      "Northern Powergrid (NPgN)": 3,
      "Northern Powergrid (NPgY)": 5,
      "ENWL": 4,
      "NGED (EMEB)": 7,
      "NGED (WEBM)": 8,
      "NGED (SWALES)": 10,
      "NGED (SWEST)": 14,
    };

    const TNUOS_GENERATION_ZONE_NAMES = {
      GZ1: "North Scotland",
      GZ2: "East Aberdeenshire",
      GZ3: "Western Highlands",
      GZ4: "Skye and Lochalsh",
      GZ5: "Eastern Grampian and Tayside",
      GZ6: "Central Grampian",
      GZ7: "Argyll",
      GZ8: "The Trossachs",
      GZ9: "Stirlingshire and Fife",
      GZ10: "South West Scotlands",
      GZ11: "Lothian and Borders",
      GZ12: "Solway and Cheviot",
      GZ13: "North East England",
      GZ14: "North Lancashire and The Lakes",
      GZ15: "South Lancashire, Yorkshire and Humber",
      GZ16: "North Midlands and North Wales",
      GZ17: "South Lincolnshire and North Norfolk",
      GZ18: "Mid Wales and The Midlands",
      GZ19: "Anglesey and Snowdon",
      GZ20: "Pembrokeshire",
      GZ21: "South Wales & Gloucester",
      GZ22: "Cotswold",
      GZ23: "Central London",
      GZ24: "Essex and Kent",
      GZ25: "Oxfordshire, Surrey and Sussex",
      GZ26: "Somerset and Wessex",
      GZ27: "West Devon and Cornwall",
    };

    const datasets = { dno: null, gsp: null, gen: null };

    proj4.defs(
      "EPSG:27700",
      "+proj=tmerc +lat_0=49 +lon_0=-2 +k=0.9996012717 +x_0=400000 +y_0=-100000 +ellps=airy +towgs84=446.448,-125.157,542.06,0.15,0.247,0.842,-20.489 +units=m +no_defs"
    );

    function bboxFromRing(ring) {
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      for (const p of ring) {
        const x = p[0];
        const y = p[1];
        if (x < minX) minX = x;
        if (x > maxX) maxX = x;
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
      return [minX, minY, maxX, maxY];
    }

    function pointInRing(point, ring) {
      const x = point[0];
      const y = point[1];
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const xi = ring[i][0], yi = ring[i][1];
        const xj = ring[j][0], yj = ring[j][1];
        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / ((yj - yi) || 1e-20) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function pointInPolygon(point, polygon) {
      if (!polygon || polygon.length === 0) return false;
      if (!pointInRing(point, polygon[0])) return false;
      for (let i = 1; i < polygon.length; i++) {
        if (pointInRing(point, polygon[i])) return false;
      }
      return true;
    }

    function toPolygons(geometry) {
      if (!geometry || !geometry.coordinates || geometry.coordinates.length === 0) return [];
      if (geometry.type === "Polygon") return [geometry.coordinates];
      if (geometry.type === "MultiPolygon") return geometry.coordinates;
      return [];
    }

    function prepareFeatures(featureCollection) {
      const out = [];
      for (const feature of featureCollection.features || []) {
        const polygons = toPolygons(feature.geometry);
        if (polygons.length === 0) continue;
        const bboxes = polygons
          .filter(poly => poly && poly.length > 0 && poly[0].length > 0)
          .map(poly => bboxFromRing(poly[0]));
        if (bboxes.length === 0) continue;

        const minX = Math.min(...bboxes.map(b => b[0]));
        const minY = Math.min(...bboxes.map(b => b[1]));
        const maxX = Math.max(...bboxes.map(b => b[2]));
        const maxY = Math.max(...bboxes.map(b => b[3]));
        out.push({ properties: feature.properties || {}, polygons, bbox: [minX, minY, maxX, maxY] });
      }
      return out;
    }

    function findContaining(point, preparedFeatures) {
      for (const item of preparedFeatures) {
        const [minX, minY, maxX, maxY] = item.bbox;
        if (point[0] < minX || point[0] > maxX || point[1] < minY || point[1] > maxY) continue;
        for (const polygon of item.polygons) {
          if (pointInPolygon(point, polygon)) return item.properties;
        }
      }
      return {};
    }

    function renderResult(rows, warning) {
      const result = document.getElementById("result");
      result.style.display = "block";
      result.innerHTML = rows.map(([k, v]) => `
        <div class="result-row">
          <div class="k">${k}</div>
          <div class="v">${v ?? "Not found"}</div>
        </div>
      `).join("") + (warning ? `<div class="warn">${warning}</div>` : "");
    }

    function getDemandZone(gspGroup) {
      return DEMAND_ZONE_FROM_GSP_GROUP[gspGroup] || { zone: null, name: null };
    }

    function getGenerationZoneLabel(genLayer) {
      if (!genLayer) return null;
      const name = TNUOS_GENERATION_ZONE_NAMES[genLayer];
      return name ? `${genLayer} (${name})` : genLayer;
    }

    function recommendBandByBasis(demandBasis, value, unit) {
      if (!Number.isFinite(value)) return null;

      if (demandBasis === "LV_NO_MIC") {
        const annualKwh = unit === "MWh" ? value * 1000 : value;
        if (!Number.isFinite(annualKwh)) return null;
        if (annualKwh <= 3986) return 1;
        if (annualKwh <= 13677) return 2;
        if (annualKwh <= 27543) return 3;
        return 4;
      }

      if (demandBasis === "LV_MIC") {
        if (value <= 90) return 1;
        if (value <= 150) return 2;
        if (value <= 250) return 3;
        return 4;
      }

      if (demandBasis === "HV") {
        if (value <= 500) return 1;
        if (value <= 1100) return 2;
        if (value <= 2000) return 3;
        return 4;
      }

      if (demandBasis === "EHV") {
        if (value <= 3500) return 1;
        if (value <= 11000) return 2;
        if (value <= 20000) return 3;
        return 4;
      }

      return null;
    }

    function recommendBandTDemand(value, unit) {
      if (!Number.isFinite(value)) return null;
      const mwh = unit === "kWh" ? value / 1000 : value;
      if (!Number.isFinite(mwh)) return null;
      if (mwh <= 25131) return 1;
      if (mwh <= 64451) return 2;
      if (mwh <= 163880) return 3;
      return 4;
    }

    function basisLabelForDisplay(demandBasis) {
      if (demandBasis === "LV_NO_MIC") return "LV no MIC";
      if (demandBasis === "LV_MIC") return "LV";
      if (demandBasis === "HV") return "HV";
      if (demandBasis === "EHV") return "EHV";
      return "LV/HV";
    }

    function basisLabelForSiteSpecific(demandBasis) {
      if (demandBasis === "HV") return "HV";
      if (demandBasis === "EHV") return "EHV";
      return "LV";
    }

    function collectLookup() {
      const lat = parseFloat(document.getElementById("lat").value);
      const lon = parseFloat(document.getElementById("lon").value);
      const status = document.getElementById("status");
      if (!Number.isFinite(lat) || !Number.isFinite(lon)) {
        status.textContent = "Enter valid numeric latitude and longitude.";
        return null;
      }
      if (!datasets.dno || !datasets.gsp || !datasets.gen) {
        status.textContent = "Datasets not loaded yet.";
        return null;
      }
      const pointWgs84 = [lon, lat];
      const pointDno = proj4("EPSG:4326", "EPSG:27700", pointWgs84);
      const dno = findContaining(pointDno, datasets.dno);
      const gsp = findContaining(pointWgs84, datasets.gsp);
      const gen = findContaining(pointWgs84, datasets.gen);
      const demandZone = getDemandZone(gsp.GSPGroup);
      const granularDuosOperator = GRANULAR_DUOS_OPERATOR_BY_REGION[dno.Area] || null;
      const expectedDemandZoneFromGranular = granularDuosOperator
        ? DEMAND_ZONE_FROM_GRANULAR_DUOS[granularDuosOperator] || null
        : null;
      return {
        lat,
        lon,
        dno,
        gsp,
        gen,
        demandZone,
        granularDuosOperator,
        expectedDemandZoneFromGranular,
      };
    }

    function buildPresetList(archetype, lookup, demandBasis, capacity, capacityUnit) {
      const out = [];
      const demandZone = lookup.demandZone.zone ?? "N/A";
      const generationZone = getGenerationZoneLabel(lookup.gen.layer) || "N/A";
      const basisDisplay = basisLabelForDisplay(demandBasis);
      const siteSpecificBasis = basisLabelForSiteSpecific(demandBasis);

      const lvHvBand = archetype.needsLvHvBand ? recommendBandByBasis(demandBasis, capacity, capacityUnit) : null;
      const residualBand = archetype.needsResidualBand
        ? (archetype.residualType === "distribution"
        ? recommendBandByBasis(demandBasis, capacity, capacityUnit)
            : recommendBandTDemand(capacity, capacityUnit))
        : null;

      for (const t of archetype.tariffs) {
        if (t === "duos_site_specific_import") {
          out.push(`${siteSpecificBasis} Site Specific - Band ${lvHvBand ?? "pending"} (imports)`);
        }
        if (t === "duos_no_residual_import") {
          out.push(`${siteSpecificBasis} Site Specific No Residual (imports)`);
        }
        if (t === "duos_generation_site_specific_export") {
          out.push(`${siteSpecificBasis} Generation Site Specific (exports)`);
        }
        if (t === "tnuos_residual") {
          const suffix = archetype.residualType === "t_demand" ? " (T-Demand)" : "";
          const basisSuffix = archetype.residualType === "distribution" ? ` [${basisDisplay}]` : "";
          out.push(`TNUoS Residual${suffix} - Band ${residualBand ?? "pending"}${basisSuffix}`);
        }
        if (t === "tnuos_import_triads") {
          out.push(`TNUoS Import (Triads) - Demand Zone ${demandZone}`);
        }
        if (t === "tnuos_embedded_export") {
          out.push(`TNUoS Embedded Export - Demand Zone ${demandZone}`);
        }
        if (t === "tnuos_wider_generation") {
          out.push(`TNUoS Wider Generation - ${generationZone}`);
        }
      }

      return { list: out, lvHvBand, residualBand };
    }

    async function loadData() {
      const status = document.getElementById("status");
      try {
        const [dno, gsp, gen] = await Promise.all([
          fetch("./data/slim_dno_20240503.geojson").then(r => r.json()),
          fetch("./data/slim_gsp_20251204.geojson").then(r => r.json()),
          fetch("./data/slim_tnuos_generation_zones.geojson").then(r => r.json()),
        ]);
        datasets.dno = prepareFeatures(dno);
        datasets.gsp = prepareFeatures(gsp);
        datasets.gen = prepareFeatures(gen);
        status.textContent = "Datasets loaded. Ready.";
      } catch (err) {
        status.textContent = "Failed to load local datasets. Start a local server and open this page from it.";
      }
    }

    document.getElementById("lookupBtn").addEventListener("click", () => {
      const status = document.getElementById("status");
      const lookup = collectLookup();
      if (!lookup) return;
      renderResult([
        ["Latitude", lookup.lat],
        ["Longitude", lookup.lon],
        ["DUoS region", lookup.dno.Area],
        ["DUoS operator", lookup.dno.DNO_Full || lookup.dno.DNO],
        ["DUoS granular operator", lookup.granularDuosOperator],
        ["TNUoS demand GSP group", lookup.gsp.GSPGroup],
        ["Demand zone", lookup.demandZone.zone ? `${lookup.demandZone.zone} (${lookup.demandZone.name})` : null],
        ["Demand zone from granular DUoS map", lookup.expectedDemandZoneFromGranular],
        ["GSP code", lookup.gsp.GSPs],
        ["TNUoS generation zone", getGenerationZoneLabel(lookup.gen.layer)],
      ], "Note: Demand and generation zones are parallel spatial lookups.");
      status.textContent = "Lookup complete.";
    });

    document.getElementById("recommendBtn").addEventListener("click", () => {
      const status = document.getElementById("status");
      const lookup = collectLookup();
      if (!lookup) return;

      const siteType = document.getElementById("siteType").value;
      const archetype = SITE_ARCHETYPES[siteType];
      const demandBasis = document.getElementById("demandBasis").value;
      const capacity = parseFloat(document.getElementById("capacity").value);
      const capacityUnit = document.getElementById("capacityUnit").value;
      if (!archetype) {
        status.textContent = "Select a valid site archetype.";
        return;
      }

      const recommendation = buildPresetList(archetype, lookup, demandBasis, capacity, capacityUnit);
      const rows = [
        ["Site archetype", archetype.label],
        ["DUoS region", lookup.dno.Area],
        ["DUoS granular operator", lookup.granularDuosOperator],
        ["TNUoS demand zone", lookup.demandZone.zone ? `${lookup.demandZone.zone} (${lookup.demandZone.name})` : null],
        ["TNUoS generation zone", getGenerationZoneLabel(lookup.gen.layer)],
        ["Input", Number.isFinite(capacity) ? `${capacity} ${capacityUnit}` : "Not supplied"],
        ["Recommended charge set", recommendation.list.join("; ")],
      ];

      if (
        Number.isFinite(lookup.expectedDemandZoneFromGranular) &&
        Number.isFinite(lookup.demandZone.zone) &&
        lookup.expectedDemandZoneFromGranular !== lookup.demandZone.zone
      ) {
        rows.push([
          "Mapping check",
          `Warning: granular DUoS maps to demand zone ${lookup.expectedDemandZoneFromGranular}, but polygon lookup returned ${lookup.demandZone.zone}`,
        ]);
      }

      if (archetype.needsLvHvBand) {
        rows.push([`${basisLabelForSiteSpecific(demandBasis)} Site Specific band`, recommendation.lvHvBand ? `Band ${recommendation.lvHvBand}` : "Band pending input"]);
      }
      if (archetype.needsResidualBand) {
        rows.push(["TNUoS Residual band", recommendation.residualBand ? `Band ${recommendation.residualBand}` : "Band pending input"]);
      }

      renderResult(
        rows,
        "Export-side tariffs (Generation Site Specific and Embedded Export) should be modelled as income on the left-hand side of your commercial model."
      );
      status.textContent = "Recommendation complete.";
    });

    function syncInputVisibility() {
      const siteType = document.getElementById("siteType").value;
      const archetype = SITE_ARCHETYPES[siteType];
      const demandBasisWrap = document.getElementById("demandBasisWrap");
      const capacityUnit = document.getElementById("capacityUnit");
      const needsBasis = !!(archetype && archetype.tariffs && archetype.tariffs.some(t => t.startsWith("duos_")));

      if (needsBasis) {
        demandBasisWrap.classList.remove("hidden");
      } else {
        demandBasisWrap.classList.add("hidden");
      }

      if (archetype && archetype.residualType === "t_demand") {
        capacityUnit.value = "MWh";
      }
    }

    document.getElementById("siteType" ).innerHTML = Object.entries(SITE_ARCHETYPES)
      .map(([value, cfg]) => `<option value="${value}">${cfg.label}</option>`)
      .join("");

    document.getElementById("demandBasis").innerHTML = `
      <option value="LV_NO_MIC">LV no MIC (kWh)</option>
      <option value="LV_MIC">LV MIC (kVA)</option>
      <option value="HV">HV (kVA)</option>
      <option value="EHV">EHV (kVA)</option>
    `;

    document.getElementById("siteType").addEventListener("change", syncInputVisibility);
    syncInputVisibility();
    loadData();
  </script>
</body>
</html>
